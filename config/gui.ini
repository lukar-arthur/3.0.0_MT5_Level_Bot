# ============================================================
#  MT5_Level_Bot — config/gui.ini
#  Модуль: GUI интерфейс + логирование
#
#  Plug-and-Play: настройки интерфейса полностью изолированы.
# ============================================================

[GUI]
# Тема: system / dark / light
appearance_mode = system

# Размер главного окна
window_width  = 1000
window_height = 680
window_min_w  = 820
window_min_h  = 560

# Размеры шрифтов (увеличены для удобства чтения)
font_size_title   = 15
font_size_label   = 13
font_size_label_sm = 12
font_size_button  = 13
font_size_console = 12
font_size_status  = 12

[LOGGING]
# Уровень логирования: DEBUG / INFO / WARNING / ERROR
log_level = DEBUG

[XAMPP]
# Путь к XAMPP Control Panel (для автозапуска MySQL)
xampp_path  = D:\XAMPP\xampp-control.exe
mysql_port  = 3306
auto_start  = false
