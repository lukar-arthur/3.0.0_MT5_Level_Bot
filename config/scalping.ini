# ============================================================
#  MT5_Level_Bot — config/scalping.ini
#  Модуль: Scalping Strategy (Signal Engine + Trader + Evaluator)
#
#  Plug-and-Play: полная изоляция параметров стратегии скальпинга.
#  При добавлении новой стратегии — создать свой .ini файл,
#  не трогая этот.
# ============================================================

# ------------------------------------------------------------------
# Signal Engine — генерация торговых сигналов
# ------------------------------------------------------------------
[SIGNAL]
# Интервал сканирования уровней в секундах (300 = 5 мин)
interval_sec = 300

# Минимальный S-score уровня для рассмотрения
min_s_score = 7.5

# Минимальный T-score для создания сигнала
min_t_score = 0.70

# Зона proximity в пипсах (fallback если нет ATR данных)
proximity_pips = 10

# Зона proximity для M5 Monitor (строже — 8 пипсов)
proximity_m5_pips = 8

# SL множитель ATR (для расчёта SL в signal_engine)
sl_atr_mult = 1.0

# TP множитель ATR (для расчёта TP в signal_engine)
tp_atr_mult = 1.5

# TTL сигнала в минутах (сигнал устаревает без подтверждения)
signal_ttl_min = 30

# Интервал M5 Monitor в секундах (30 = каждые 30 сек)
m5_monitor_sec = 30

# Торговая сессия UTC (0-23)
# 07:00–16:00 UTC = 11:00–20:00 Ереван (EU/US overlap)
session_start_utc = 7
session_end_utc   = 16

# Фильтры
adx_max_sideways = 25.0
vol_spike_min    = 1.2

# ADX множители proximity по таймфреймам
prox_atr_h1   = 0.5
prox_atr_h4   = 0.3
prox_atr_d    = 0.2
prox_atr_default = 0.4

# ------------------------------------------------------------------
# Trader v3.0 — открытие и управление позицией
# ------------------------------------------------------------------
[TRADER]
# Интервал мониторинга открытых позиций в секундах
monitor_sec = 10

# Размер лота
lot_size = 0.01

# Разрешить торговлю на РЕАЛЬНОМ счёте (false = только демо!)
allow_real = false

# Magic number для идентификации ордеров бота
magic = 20250318

# Фиксированный SL в пипсах ($0.80 при лоте 0.01)
sl_fixed_pips = 8

# Перенос SL на безубыток при P&L >= breakeven_pips
breakeven_pips = 5

# Активация агрессивного trailing при P&L >= partial_close_pips
partial_close_pips = 8

# Тайм-стоп: закрыть если болтается > N минут без движения
time_stop_min = 20

# Нижняя/верхняя граница P&L для определения "болтания" (пипсы)
time_stop_min_pips = -2
time_stop_max_pips = 4

# Trailing stop дистанция в пипсах от пика
trailing_stop_pips = 8

# Trailing активируется после достижения N пипсов прибыли
trailing_start_pips = 5

# ------------------------------------------------------------------
# Evaluator — виртуальная оценка сигналов
# ------------------------------------------------------------------
[EVALUATOR]
# Интервал запуска оценщика в секундах
interval_sec = 300

# Оцениваем сигналы старше N минут (после истечения TTL)
eval_delay_min = 30

# Смотрим историю N минут после сигнала
eval_window_min = 120

# Максимум сигналов за один цикл оценки
batch_size = 20
