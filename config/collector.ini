# ============================================================
#  MT5_Level_Bot — config/collector.ini
#  Модуль: Collector (сборщик уровней из MT5)
#
#  Plug-and-Play: этот файл полностью определяет поведение
#  модуля Collector. Изменение параметров здесь не затрагивает
#  другие модули. При переносе модуля — перенеси только этот файл.
# ============================================================

[COLLECTOR]
# Торговые пары для анализа (через запятую)
symbols = EURUSD,GBPUSD,USDJPY,USDCHF,AUDUSD,EURGBP

# Таймфреймы (разрешённые: D, H4, H1, H2, M30, M15)
timeframes = D,H4,H1

# Сколько баров загружать из MT5 (больше = точнее, медленнее)
bars_to_fetch = 700

# Интервал повторного сбора в секундах (1800 = 30 мин)
interval_sec = 1800

# Параметры алгоритма поиска экстремумов
extremum_left  = 5
extremum_right = 2

# Минимальное количество отскоков для записи уровня в БД
min_bounce_to_record = 1

# Максимум уровней на один таймфрейм
max_levels_per_tf = 30

# Множители ATR-зоны по таймфреймам (уровень ± ATR×mult)
atr_zone_mult_D   = 0.10
atr_zone_mult_H4  = 0.15
atr_zone_mult_H1  = 0.25
atr_zone_mult_M15 = 0.35
atr_zone_mult_M5  = 0.50
atr_zone_mult_M1  = 0.50

# Параметры retry при неполных данных
rates_retry_count = 3
rates_retry_delay = 2.5

# Параметры retry при обрыве соединения
conn_retry_count = 2
conn_retry_delay = 5.0

# Таймаут цикла: не более 80% от interval_sec
cycle_max_fraction = 0.80
