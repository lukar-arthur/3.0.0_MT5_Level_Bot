# ============================================================
#  MT5_Level_Bot — config/analyzer.ini
#  Модуль: Analyzer (расчёт силы уровней, S-score)
#
#  Plug-and-Play: изменение весов и порогов здесь не затрагивает
#  другие модули. Можно подключить другую стратегию расчёта S
#  не трогая Collector, Signal Engine или Trader.
# ============================================================

[ANALYZER]
# Минимальное количество отскоков для включения в анализ
min_bounce_count = 3

# Максимальный возраст последнего касания в днях (H1 базовый)
# H4 = base × 1.7, D = base × 4.7
max_touch_age_days = 3

# ADX пороги для фактора динамики
adx_sideways_threshold = 20
adx_trend_threshold    = 40

# Интервал анализа в секундах (3600 = 1 час)
interval_sec = 3600

# ------------------------------------------------------------------
# Веса факторов S-score (сумма ДОЛЖНА быть 1.0)
# B=отскоки F=свежесть C=конфлюенс V=объём M=мультиТФ
# R=смена_роли D=ADX_динамика Stat=статистика RSI=RSI
# ------------------------------------------------------------------
[WEIGHTS]
w_bounce     = 0.25
w_freshness  = 0.20
w_confluence = 0.15
w_volume     = 0.15
w_multitf    = 0.10
w_reversal   = 0.03
w_dynamics   = 0.04
w_stat       = 0.01
w_rsi        = 0.07

# ------------------------------------------------------------------
# Параметры нормализации факторов
# ------------------------------------------------------------------
[NORMALISATION]
# Максимум отскоков (больше → нормализуется к 1.0)
bounce_max = 8
# Максимум конфлюенс-очков
confluence_max = 5
# Максимальный ratio объёма (3.0 = объём в 3× среднего → score=1.0)
volume_ratio_max = 3.0
# Максимум средних пипсов отскока (для нормализации Stat)
stat_pips_max = 30.0
# Лямбда для экспоненциального распада свежести
# 0.005 → 50% за ~138 часов; 0.015 → 50% за ~46 часов
freshness_lambda = 0.005

# ------------------------------------------------------------------
# Пороги классификации уровней
# ------------------------------------------------------------------
[CLASSIFICATION]
very_strong = 8.0
strong      = 6.5
medium      = 4.5
weak        = 2.5
